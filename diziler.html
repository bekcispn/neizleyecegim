<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Diziler - IMDB En Yüksek Puanlılar | Abican</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #0a0f1e 0%, #030712 100%);
            color: #f1f5f9;
            min-height: 100vh;
        }

        .header {
            background: rgba(15, 25, 45, 0.95);
            backdrop-filter: blur(20px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            border-bottom: 1px solid rgba(245, 197, 24, 0.3);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo h1 {
            font-size: 1.3rem;
            background: linear-gradient(135deg, #f5c518, #f97316);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo i {
            color: #f5c518;
            margin-right: 8px;
        }

        .back-btn {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(245, 197, 24, 0.3);
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            color: #f5c518;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .back-btn:hover {
            background: #f5c518;
            color: #0f172a;
        }

        .category-tabs {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.6rem;
            margin: 1.5rem 1rem;
        }

        .cat-btn {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            color: #cbd5e1;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.8rem;
        }

        .cat-btn i {
            margin-right: 6px;
        }

        .cat-btn.active {
            background: #f5c518;
            color: #0f172a;
            border-color: #f5c518;
        }

        .dizi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 1.5rem;
            padding: 1rem 1.5rem 3rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .dizi-card {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(245, 197, 24, 0.15);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .dizi-card:hover {
            transform: translateY(-6px);
            border-color: #f5c518;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4);
        }

        .poster {
            width: 100%;
            height: 300px;
            object-fit: cover;
            background: linear-gradient(135deg, #1e293b, #0f172a);
        }

        .info {
            padding: 0.9rem;
        }

        .title {
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 0.3rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .imdb {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: #f5c518;
            color: #000;
            font-weight: bold;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.7rem;
            margin: 0.5rem 0;
        }

        .detail {
            font-size: 0.7rem;
            color: #94a3b8;
            margin: 6px 0;
        }

        .watched-btn {
            background: rgba(45, 58, 78, 0.8);
            border: none;
            color: #f5c518;
            padding: 0.4rem;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
            margin-top: 0.6rem;
            width: 100%;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .watched-btn.watched {
            background: #10b981;
            color: white;
            cursor: default;
            opacity: 0.8;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border-radius: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            border: 1px solid rgba(245, 197, 24, 0.3);
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-header {
            position: relative;
        }

        .modal-poster {
            width: 100%;
            height: 350px;
            object-fit: cover;
            border-radius: 30px 30px 0 0;
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0, 0, 0, 0.6);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
        }

        .modal-close:hover {
            background: #f97316;
        }

        .modal-body {
            padding: 1.5rem;
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .modal-meta {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
            margin: 1rem 0;
        }

        .modal-imdb {
            background: #f5c518;
            color: #000;
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
            font-weight: bold;
        }

        .modal-year, .modal-seasons {
            background: rgba(255, 255, 255, 0.1);
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
        }

        .modal-plot {
            margin: 1rem 0;
            line-height: 1.6;
            color: #cbd5e1;
        }

        .modal-plot h4 {
            color: #f5c518;
            margin-bottom: 0.5rem;
        }

        .modal-watch-btn {
            width: 100%;
            padding: 0.8rem;
            background: #f5c518;
            border: none;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 1rem;
        }

        .footer {
            text-align: center;
            padding: 1.5rem;
            font-size: 0.7rem;
            color: #475569;
        }

        .stats {
            text-align: center;
            padding: 0.5rem;
            color: #f5c518;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">
        <h1><i class="fas fa-tv"></i> ABICAN DİZİLER</h1>
    </div>
    <button class="back-btn" onclick="window.location.href='index.html'"><i class="fas fa-arrow-left"></i> Ana Menü</button>
</div>

<div class="category-tabs" id="categoryContainer"></div>
<div class="stats" id="stats"></div>
<div class="dizi-grid" id="diziGrid"></div>
<div class="footer">
    <i class="fas fa-star" style="color: #f5c518;"></i> IMDB puanları güncel • 
    <i class="fas fa-check-circle" style="color: #10b981;"></i> İzlediklerin kaybolur •
    <i class="fas fa-info-circle"></i> Diziye tıkla detayları gör
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <img id="modalPoster" class="modal-poster" src="" alt="">
            <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
        </div>
        <div class="modal-body">
            <h2 class="modal-title" id="modalTitle"></h2>
            <div class="modal-meta">
                <span class="modal-imdb" id="modalImdb"><i class="fab fa-imdb"></i> </span>
                <span class="modal-year" id="modalYear"><i class="far fa-calendar-alt"></i> </span>
                <span class="modal-seasons" id="modalSeasons"><i class="fas fa-layer-group"></i> </span>
            </div>
            <div class="modal-plot">
                <h4><i class="fas fa-align-left"></i> Konusu</h4>
                <p id="modalPlot"></p>
            </div>
            <button class="modal-watch-btn" id="modalWatchBtn"><i class="fas fa-eye"></i> İZLEDİM</button>
        </div>
    </div>
</div>

<script>
    const DIZILER = [
        { 
            id: 1, title: "Breaking Bad", category: "Suç", 
            poster: "https://image.tmdb.org/t/p/w500/ggFHVNu6YYI5L9pCfOacjizRGt.jpg", 
            seasons: "5 Sezon", episodeMins: "47 dk", imdb: "9.5", year: "2008",
            plot: "Lise kimya öğretmeni Walter White, akciğer kanseri teşhisi alınca ailesine maddi bir gelecek bırakmak için uyuşturucu üretmeye başlar. Eski öğrencisi Jesse Pinkman ile birlikte suç dünyasının en büyük isimlerinden biri olur."
        },
        { 
            id: 2, title: "Game of Thrones", category: "Fantastik", 
            poster: "https://image.tmdb.org/t/p/w500/7WUHnWGx5jj145A2HM6M4SjF4dB.jpg", 
            seasons: "8 Sezon", episodeMins: "55 dk", imdb: "9.2", year: "2011",
            plot: "Taht Oyunları, Westeros kıtasındaki yedi krallık için yapılan iktidar savaşını anlatır. Demir Taht'ı ele geçirmek isteyen soylu aileler, entrikalar, savaşlar ve ejderhalarla dolu bir mücadeleye girişir."
        },
        { 
            id: 3, title: "Stranger Things", category: "Bilim Kurgu", 
            poster: "https://image.tmdb.org/t/p/w500/49WJfeNqCm1ZbKqHj5PasUzXHnZ.jpg", 
            seasons: "4 Sezon", episodeMins: "51 dk", imdb: "8.7", year: "2016",
            plot: "1980'lerin küçük bir kasabasında, bir çocuk gizemli bir şekilde kaybolur. Arkadaşları, ailesi ve kasabanın şerifi, paralel bir evren olan Tersyüz'ün sırlarını ortaya çıkarmaya çalışır."
        },
        { 
            id: 4, title: "The Sopranos", category: "Suç", 
            poster: "https://image.tmdb.org/t/p/w500/rLbbrYkU2VcG8Vdn0Sgso0E6TWZ.jpg", 
            seasons: "6 Sezon", episodeMins: "55 dk", imdb: "9.2", year: "1999",
            plot: "New Jersey mafya lideri Tony Soprano, iş ve aile hayatını dengelemeye çalışırken psikolojik sorunlar yaşar. Bir psikiyatriste gitmeye başlayan Tony, suç dünyasının zorluklarıyla başa çıkmaya çalışır."
        },
        { 
            id: 5, title: "The Wire", category: "Suç", 
            poster: "https://image.tmdb.org/t/p/w500/4mx8jXtzwMpePzkPRiPHVsOTVCu.jpg", 
            seasons: "5 Sezon", episodeMins: "59 dk", imdb: "9.3", year: "2002",
            plot: "Baltimore şehrinin uyuşturucu ticaretini, liman işçilerini, belediye politikalarını ve eğitim sistemini mercek altına alan dizi, her sezon farklı bir kurumu odağına alır."
        },
        { 
            id: 6, title: "Better Call Saul", category: "Suç", 
            poster: "https://image.tmdb.org/t/p/w500/fC2HDm5t0kHl7McTmNlSr30D8i8.jpg", 
            seasons: "6 Sezon", episodeMins: "52 dk", imdb: "9.0", year: "2015",
            plot: "Breaking Bad'in sevilen avukatı Saul Goodman'ın, Jimmy McGill olduğu günlere uzanan hikayesi. İyi niyetli bir avukatken yavaş yavaş suç dünyasının içine çekilen Jimmy'nin dönüşümü anlatılır."
        },
        { 
            id: 7, title: "Sherlock", category: "Gizem", 
            poster: "https://image.tmdb.org/t/p/w500/7WTsnHkbA0FaG6R9twfFde4IqR8.jpg", 
            seasons: "4 Sezon", episodeMins: "88 dk", imdb: "9.1", year: "2010",
            plot: "Modern Londra'da geçen dizi, ünlü dedektif Sherlock Holmes ve arkadaşı Dr. John Watson'ın çözdüğü karmaşık vakaları konu alır. Sherlock'un dehası ve sosyal beceriksizliği her bölümde izleyiciyi büyüler."
        },
        { 
            id: 8, title: "Friends", category: "Komedi", 
            poster: "https://image.tmdb.org/t/p/w500/f496cm9enuEsZkSPzCwnTESEK5s.jpg", 
            seasons: "10 Sezon", episodeMins: "22 dk", imdb: "8.9", year: "1994",
            plot: "New York'ta yaşayan altı arkadaşın hayatları, aşkları ve işleri etrafında dönen komedi dizisi. Monica, Rachel, Phoebe, Chandler, Joey ve Ross'un birbirleriyle olan ilişkileri eğlenceli bir dille anlatılır."
        },
        { 
            id: 9, title: "The Office US", category: "Komedi", 
            poster: "https://image.tmdb.org/t/p/w500/qWnJxZirhqB2k0rMfmpL76cjObJ.jpg", 
            seasons: "9 Sezon", episodeMins: "22 dk", imdb: "9.0", year: "2005",
            plot: "Dunder Mifflin kağıt şirketinin çalışanlarının günlük hayatlarını belgesel formatında anlatan dizi, bölge müdürü Michael Scott'ın garip yönetim tarzıyla komik olaylara sahne olur."
        },
        { 
            id: 10, title: "Black Mirror", category: "Bilim Kurgu", 
            poster: "https://image.tmdb.org/t/p/w500/5UaYsGZOFhjFDwQh6GuLjjA4Wsu.jpg", 
            seasons: "6 Sezon", episodeMins: "60 dk", imdb: "8.7", year: "2011",
            plot: "Teknolojinin karanlık yüzünü ve insan doğasını sorgulayan antoloji dizisi. Her bölüm bağımsız bir hikaye anlatır ve izleyiciyi teknolojinin olası tehlikeleri hakkında düşündürür."
        }
    ];

    let currentCategory = "Tümü";
    let watchedIds = JSON.parse(localStorage.getItem("watched_dizi_ids")) || [];
    let currentDiziId = null;

    function saveWatched(id) {
        if(!watchedIds.includes(id)) {
            watchedIds.push(id);
            localStorage.setItem("watched_dizi_ids", JSON.stringify(watchedIds));
            renderDiziler();
            renderCategories();
            if(currentDiziId === id) {
                document.getElementById("modalWatchBtn").innerHTML = '<i class="fas fa-check-circle"></i> İZLENDİ';
            }
        }
    }

    function isWatched(id) {
        return watchedIds.includes(id);
    }

    function getFilteredDiziler() {
        let diziler = [...DIZILER];
        if(currentCategory !== "Tümü") {
            diziler = diziler.filter(d => d.category === currentCategory);
        }
        diziler = diziler.filter(d => !isWatched(d.id));
        diziler.sort((a,b) => parseFloat(b.imdb) - parseFloat(a.imdb));
        return diziler;
    }

    function renderCategories() {
        const categories = ["Tümü", "Suç", "Fantastik", "Bilim Kurgu", "Komedi", "Gizem"];
        const container = document.getElementById("categoryContainer");
        container.innerHTML = "";
        categories.forEach(cat => {
            const btn = document.createElement("button");
            btn.className = "cat-btn";
            if(currentCategory === cat) btn.classList.add("active");
            
            let icon = "";
            if(cat === "Tümü") icon = '<i class="fas fa-border-all"></i>';
            else if(cat === "Suç") icon = '<i class="fas fa-gavel"></i>';
            else if(cat === "Fantastik") icon = '<i class="fas fa-dragon"></i>';
            else if(cat === "Bilim Kurgu") icon = '<i class="fas fa-rocket"></i>';
            else if(cat === "Komedi") icon = '<i class="fas fa-laugh"></i>';
            else icon = '<i class="fas fa-tag"></i>';
            
            btn.innerHTML = `${icon} ${cat}`;
            btn.addEventListener("click", () => {
                currentCategory = cat;
                renderCategories();
                renderDiziler();
            });
            container.appendChild(btn);
        });
    }

    function openModal(dizi) {
        currentDiziId = dizi.id;
        document.getElementById("modalPoster").src = dizi.poster;
        document.getElementById("modalTitle").innerHTML = dizi.title;
        document.getElementById("modalImdb").innerHTML = `<i class="fab fa-imdb"></i> ${dizi.imdb}`;
        document.getElementById("modalYear").innerHTML = `<i class="far fa-calendar-alt"></i> ${dizi.year}`;
        document.getElementById("modalSeasons").innerHTML = `<i class="fas fa-layer-group"></i> ${dizi.seasons}`;
        document.getElementById("modalPlot").innerHTML = dizi.plot;
        
        const watchBtn = document.getElementById("modalWatchBtn");
        if(isWatched(dizi.id)) {
            watchBtn.innerHTML = '<i class="fas fa-check-circle"></i> İZLENDİ';
        } else {
            watchBtn.innerHTML = '<i class="fas fa-eye"></i> İZLEDİM';
        }
        
        document.getElementById("modal").style.display = "flex";
    }

    function closeModal() {
        document.getElementById("modal").style.display = "none";
        currentDiziId = null;
    }

    function renderDiziler() {
        const grid = document.getElementById("diziGrid");
        const diziler = getFilteredDiziler();
        const stats = document.getElementById("stats");
        stats.innerHTML = `<i class="fas fa-tv"></i> Toplam ${diziler.length} dizi gösteriliyor <i class="fas fa-eye-slash"></i> İzlediklerin çıkarıldı`;
        
        if(diziler.length === 0) {
            grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:3rem;"><i class="fas fa-ticket-alt" style="font-size: 3rem; color: #f5c518;"></i><p style="margin-top: 1rem;">🎉 Tüm dizileri izledin! Yeni sezonlar bekleniyor...</p></div>`;
            return;
        }
        
        grid.innerHTML = "";
        diziler.forEach(dizi => {
            const card = document.createElement("div");
            card.className = "dizi-card";
            const isWatchedDizi = isWatched(dizi.id);
            card.innerHTML = `
                <img class="poster" src="${dizi.poster}" alt="${dizi.title}" loading="lazy" onerror="this.src='https://image.tmdb.org/t/p/w500/8cdWjvZQUxUrmHMPOju9Ftv7Z8d.jpg'">
                <div class="info">
                    <div class="title">${dizi.title}</div>
                    <div class="imdb"><i class="fab fa-imdb"></i> ${dizi.imdb}</div>
                    <div class="detail"><i class="fas fa-layer-group"></i> ${dizi.seasons} • <i class="far fa-clock"></i> ${dizi.episodeMins}/bölüm</div>
                    <button class="watched-btn ${isWatchedDizi ? 'watched' : ''}" data-id="${dizi.id}">
                        ${isWatchedDizi ? '<i class="fas fa-check-circle"></i> İZLENDİ' : '<i class="fas fa-eye"></i> İZLEDİM'}
                    </button>
                </div>
            `;
            
            card.addEventListener("click", (e) => {
                if(e.target.classList.contains("watched-btn")) return;
                openModal(dizi);
            });
            
            const btn = card.querySelector(".watched-btn");
            if(!isWatchedDizi) {
                btn.addEventListener("click", (e) => {
                    e.stopPropagation();
                    const id = parseInt(btn.getAttribute("data-id"));
                    saveWatched(id);
                    renderDiziler();
                    renderCategories();
                });
            }
            grid.appendChild(card);
        });
    }

    window.onclick = function(event) {
        const modal = document.getElementById("modal");
        if (event.target === modal) {
            closeModal();
        }
    }

    document.getElementById("modalWatchBtn").addEventListener("click", () => {
        if(currentDiziId && !isWatched(currentDiziId)) {
            saveWatched(currentDiziId);
            renderDiziler();
            renderCategories();
        }
    });

    renderCategories();
    renderDiziler();
</script>
</body>
</html>
