<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abican | Film & Dizi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #030712);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #020617;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.8s;
        }
        .loader {
            width: 70px;
            height: 70px;
            border: 4px solid rgba(249,115,22,0.2);
            border-top: 4px solid #f97316;
            border-radius: 50%;
            animation: spin 0.8s infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loading-text {
            margin-top: 30px;
            font-size: 1.3rem;
            font-weight: 600;
            background: linear-gradient(135deg, #f97316, #facc15);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .menu-container {
            display: none;
            text-align: center;
            padding: 2rem;
            animation: fadeIn 0.6s;
        }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .menu-title { font-size: 2.5rem; font-weight: 800; background: linear-gradient(135deg, #FFD166, #FF6B6B, #f97316); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .menu-sub { color: #94a3b8; margin-bottom: 3rem; }
        .menu-cards { display: flex; justify-content: center; gap: 2rem; flex-wrap: wrap; }
        .menu-card { background: rgba(30,41,59,0.7); backdrop-filter: blur(16px); border: 1px solid rgba(249,115,22,0.3); border-radius: 48px; padding: 2rem 3rem; cursor: pointer; transition: 0.3s; text-align: center; min-width: 220px; }
        .menu-card:hover { transform: translateY(-10px); border-color: #f97316; background: rgba(249,115,22,0.2); }
        .menu-card i { font-size: 3rem; color: #facc15; margin-bottom: 1rem; }
        .menu-card h2 { font-size: 1.8rem; color: #fff; }
        .menu-card p { color: #94a3b8; font-size: 0.8rem; }
        @media (max-width: 600px) { .menu-card { padding: 1rem 1.5rem; min-width: 160px; } .menu-title { font-size: 1.8rem; } }
    </style>
</head>
<body>
<div class="loading-screen" id="loadingScreen">
    <div class="loader"></div>
    <div class="loading-text" id="loadingMsg">Filmler hazırlanıyor..</div>
</div>
<div class="menu-container" id="menuContainer">
    <div class="menu-title">🎬 Abican'ın Sineması</div>
    <div class="menu-sub">Ne izlemek istiyorsun?</div>
    <div class="menu-cards">
        <div class="menu-card" onclick="location.href='filmler.html'">
            <i class="fas fa-film"></i>
            <h2>Filmler</h2>
            <p><i class="fab fa-imdb"></i> IMDb puanları • Kategoriler</p>
        </div>
        <div class="menu-card" onclick="location.href='diziler.html'">
            <i class="fas fa-tv"></i>
            <h2>Diziler</h2>
            <p><i class="fab fa-imdb"></i> En yüksek puanlılar • Takip</p>
        </div>
    </div>
</div>
<script>
    const loadingScreen = document.getElementById('loadingScreen');
    const loadingMsg = document.getElementById('loadingMsg');
    const messages = ["Filmler hazırlanıyor..", "Diziler taranıyor..", "IMDb puanları getiriliyor..", "Abican biraz sabır.."];
    let idx = 0;
    const interval = setInterval(() => { loadingMsg.innerHTML = messages[idx % messages.length]; idx++; if(idx === 5) clearInterval(interval); }, 600);
    setTimeout(() => {
        clearInterval(interval);
        loadingMsg.innerHTML = "🎉 Hoşgeldin Abican, Filmini Seçmeye Başla.";
        setTimeout(() => { loadingScreen.style.opacity = "0"; setTimeout(() => { loadingScreen.style.display = "none"; document.getElementById("menuContainer").style.display = "block"; }, 600); }, 1500);
    }, 2500);
</script>
</body>
</html>
