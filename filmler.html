<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #0b1120, #030712);
            color: #f1f5f9;
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(112deg, rgba(15, 25, 45, 0.95), rgba(0, 0, 0, 0.85));
            backdrop-filter: blur(18px);
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            border-bottom: 2px solid #f5c518;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(135deg, #f5c518, #f97316);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .back-btn {
            background: #1e293b;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            color: #f5c518;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }

        .back-btn:hover {
            background: #f5c518;
            color: #0f172a;
        }

        .category-tabs {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.7rem;
            margin: 1.8rem 1rem;
            max-height: 120px;
            overflow-y: auto;
            padding: 0.5rem;
        }

        .cat-btn {
            background: #1e293b;
            border: none;
            padding: 0.6rem 1.3rem;
            border-radius: 60px;
            color: #e2e8f0;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.85rem;
            white-space: nowrap;
        }

        .cat-btn.active {
            background: #f5c518;
            color: #0a0c15;
            box-shadow: 0 0 10px #f5c518;
        }

        .film-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
            gap: 1.8rem;
            padding: 1rem 2rem 3rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .film-card {
            background: rgba(17, 24, 39, 0.75);
            backdrop-filter: blur(6px);
            border-radius: 28px;
            overflow: hidden;
            border: 1px solid rgba(245, 197, 24, 0.2);
            transition: all 0.25s;
        }

        .film-card:hover {
            transform: translateY(-7px);
            border-color: #f5c518;
            box-shadow: 0 20px 28px -12px black;
        }

        .poster {
            width: 100%;
            height: 300px;
            object-fit: cover;
            background: #0f172a;
        }

        .info {
            padding: 1rem;
        }

        .title {
            font-weight: 700;
            font-size: 0.95rem;
            margin-bottom: 0.3rem;
        }

        .imdb {
            display: inline-block;
            background: #f5c518;
            color: #000;
            font-weight: bold;
            padding: 0.15rem 0.7rem;
            border-radius: 20px;
            font-size: 0.75rem;
            margin: 0.5rem 0;
        }

        .duration {
            font-size: 0.75rem;
            color: #9ca3af;
            margin: 6px 0;
        }

        .watched-btn {
            background: #2d3a4e;
            border: none;
            color: #f5c518;
            padding: 0.45rem;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: bold;
            margin-top: 0.7rem;
            width: 100%;
            cursor: pointer;
            transition: 0.2s;
        }

        .watched-btn.watched {
            background: #10b981;
            color: white;
            cursor: default;
            opacity: 0.7;
        }

        .footer {
            text-align: center;
            padding: 2rem;
            font-size: 0.7rem;
            color: #475569;
        }

        .stats {
            text-align: center;
            padding: 0.5rem;
            color: #f5c518;
            font-size: 0.8rem;
        }
    </style>
</head>

    // 6. ROMANTİK (50 film)
    const romantikFilmler = [

        "P.S. I Love You", "Love Actually", "Notting Hill", "Four Weddings and a Funeral", "Bridget Jones's Diary", "10 Things I Hate About You", "She's All That", "Never Been Kissed", "The Wedding Singer", "50 First Dates",

        "La La Land", "Silver Linings Playbook", "Crazy Stupid Love", "The Proposal", "27 Dresses", "Made of Honor", "The Ugly Truth", "How to Lose a Guy in 10 Days", "What Happens in Vegas", "The Back-up Plan",
        "When Harry Met Sally", "Sleepless in Seattle", "You've Got Mail", "While You Were Sleeping", "Pretty Woman", "Runaway Bride", "Maid in Manhattan", "Mona Lisa Smile", "The Holiday", "Something's Gotta Give"

        "The Others", "The Orphanage", "The Devil's Backbone", "Crimson Peak", "Rebecca", "Suspiria", "Deep Red", "Tenebrae", "Phenomena", "Opera"
    ];

        });
    });

    // 8. SUÇ (50 film)
    const sucFilmler = [
        "The Godfather", "The Godfather Part II", "Goodfellas", "Casino", "The Irishman", "Scarface", "Carlito's Way", "Donnie Brasco", "The Departed", "Heat",

        "A Prophet", "Mesrine", "Gomorrah", "City of God", "Elite Squad", "The Secret in Their Eyes", "Nine Queens", "The Aura", "Chinese Takeaway", "Wild Tales",
        "Eastern Promises", "A History of Violence", "Road to Perdition", "Miller's Crossing", "Blood Simple", "Fargo", "No Country for Old Men", "Hell or High Water", "Wind River", "Sicario"
    ];
    sucFilmler.forEach((title, idx) => {
        FILMLER.push({
            id: filmId++, title: title, category: "Suç",
            poster: `https://image.tmdb.org/t/p/w500/${75 + idx % 100}/300/450`,
            duration: `${2 + (idx % 3)}s ${25 + (idx * 4) % 59}dk`,
            imdb: (7.8 + (idx % 17) / 10).toFixed(1)
        });
    });

    // 9. ANİMASYON (50 film)
    const animasyonFilmler = [
        "Spirited Away", "Princess Mononoke", "Howl's Moving Castle", "My Neighbor Totoro", "Kiki's Delivery Service", "Castle in the Sky", "Nausicaa", "Porco Rosso", "The Wind Rises", "Grave of the Fireflies",

        "Shrek", "How to Train Your Dragon", "Kung Fu Panda", "Madagascar", "Despicable Me", "Minions", "The Lego Movie", "Spider-Man Into the Spider-Verse", "Spider-Man Across the Spider-Verse", "The Mitchells vs the Machines",

    ];

            id: filmId++, title: title, category: "Animasyon",
            poster: `https://image.tmdb.org/t/p/w500/${85 + idx % 100}/300/450`,

        });
    });

    // Toplam film sayısını hesapla
    console.log(`Toplam film sayısı: ${FILMLER.length}`);

    let currentCategory = "Tümü";
    let watchedIds = JSON.parse(localStorage.getItem("watched_film_ids")) || [];

    function saveWatched(id) {
        if(!watchedIds.includes(id)) {
            watchedIds.push(id);
            localStorage.setItem("watched_film_ids", JSON.stringify(watchedIds));
        }
    }

    function isWatched(id) {
        return watchedIds.includes(id);
    }

    function getFilteredFilms() {
        let films = [...FILMLER];
        if(currentCategory !== "Tümü") {
            films = films.filter(f => f.category === currentCategory);
        }
        films = films.filter(f => !isWatched(f.id));
        films.sort((a,b) => parseFloat(b.imdb) - parseFloat(a.imdb));
        return films;
    }

    function renderCategories() {
        const categories = ["Tümü", "Aksiyon", "Korku", "Dram", "Komedi", "Bilim Kurgu", "Romantik", "Gerilim", "Suç", "Animasyon"];
        const container = document.getElementById("categoryContainer");
        container.innerHTML = "";
        categories.forEach(cat => {
            const btn = document.createElement("button");
            btn.innerText = cat;
            btn.classList.add("cat-btn");
            if(currentCategory === cat) btn.classList.add("active");
            btn.addEventListener("click", () => {
                currentCategory = cat;
                renderCategories();
                renderFilms();
            });
            container.appendChild(btn);
        });
    }

    function renderFilms() {
        const grid = document.getElementById("filmGrid");
        const films = getFilteredFilms();
        const stats = document.getElementById("stats");
        stats.innerHTML = `📊 Toplam ${films.length} film gösteriliyor (İzlediklerin çıkarıldı)`;
        
        if(films.length === 0) {
            grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:3rem;">🎉 Tüm filmleri izledin! Yeni filmler ekleniyor...</div>`;
            return;
        }
        grid.innerHTML = "";
        films.forEach(film => {
            const card = document.createElement("div");
            card.className = "film-card";
            const isWatchedFilm = isWatched(film.id);
            card.innerHTML = `
                <img class="poster" src="${film.poster}" alt="${film.title}" loading="lazy" onerror="this.src='https://image.tmdb.org/t/p/w500/8cdWjvZQUxUrmHMPOju9Ftv7Z8d.jpg'">
                <div class="info">
                    <div class="title">${film.title}</div>
                    <div class="imdb">⭐ ${film.imdb}</div>
                    <div class="duration">⏱️ ${film.duration}</div>
                    <button class="watched-btn ${isWatchedFilm ? 'watched' : ''}" data-id="${film.id}">${isWatchedFilm ? "✓ İZLENDİ" : "📌 İZLEDİM"}</button>
                </div>
            `;
            const btn = card.querySelector(".watched-btn");
            if(!isWatchedFilm) {
                btn.addEventListener("click", (e) => {
                    e.stopPropagation();
                    const id = parseInt(btn.getAttribute("data-id"));
                    saveWatched(id);
                    renderFilms();
                    renderCategories();
                });
            }
            grid.appendChild(card);
        });
    }

    renderCategories();
    renderFilms();
</script>
</body>
