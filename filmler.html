<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Filmler - IMDb | Abican</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #0a0f1e, #030712); color: #fff; min-height: 100vh; }
        .header { background: rgba(15,25,45,0.95); backdrop-filter: blur(20px); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; border-bottom: 1px solid #f5c518; position: sticky; top: 0; z-index: 100; }
        .logo h1 { font-size: 1.3rem; background: linear-gradient(135deg, #f5c518, #f97316); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .back-btn { background: #1e293b; border: 1px solid #f5c518; padding: 0.5rem 1.2rem; border-radius: 40px; color: #f5c518; cursor: pointer; font-weight: 600; }
        .back-btn:hover { background: #f5c518; color: #0f172a; }
        .category-tabs { display: flex; flex-wrap: wrap; justify-content: center; gap: 0.6rem; margin: 1.5rem 1rem; }
        .cat-btn { background: #1e293b; padding: 0.5rem 1.2rem; border-radius: 40px; color: #cbd5e1; cursor: pointer; font-size: 0.8rem; transition: 0.2s; }
        .cat-btn i { margin-right: 6px; }
        .cat-btn.active { background: #f5c518; color: #0f172a; }
        .film-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1.5rem; padding: 1rem 1.5rem 2rem; max-width: 1400px; margin: 0 auto; }
        .film-card { background: rgba(17,24,39,0.7); backdrop-filter: blur(10px); border-radius: 16px; overflow: hidden; border: 1px solid rgba(245,197,24,0.15); transition: 0.3s; cursor: pointer; }
        .film-card:hover { transform: translateY(-6px); border-color: #f5c518; }
        .poster { width: 100%; height: 280px; object-fit: cover; background: #1e293b; }
        .info { padding: 0.8rem; }
        .title { font-weight: 600; font-size: 0.85rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .imdb { display: inline-flex; align-items: center; gap: 4px; background: #f5c518; color: #000; font-weight: bold; padding: 0.15rem 0.5rem; border-radius: 20px; font-size: 0.65rem; margin: 0.4rem 0; }
        .year { font-size: 0.65rem; color: #94a3b8; }
        .watched-btn { background: #2d3a4e; border: none; color: #f5c518; padding: 0.35rem; border-radius: 30px; font-size: 0.65rem; font-weight: 600; margin-top: 0.5rem; width: 100%; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .watched-btn.watched { background: #10b981; color: white; cursor: default; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: linear-gradient(135deg, #1e293b, #0f172a); border-radius: 24px; max-width: 500px; width: 90%; max-height: 85vh; overflow-y: auto; border: 1px solid #f5c518; }
        .modal-header { position: relative; }
        .modal-poster { width: 100%; height: 350px; object-fit: cover; border-radius: 24px 24px 0 0; background: #1e293b; }
        .modal-close { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.6); border: none; color: white; width: 36px; height: 36px; border-radius: 50%; font-size: 1rem; cursor: pointer; }
        .modal-close:hover { background: #f97316; }
        .modal-body { padding: 1.5rem; }
        .modal-title { font-size: 1.3rem; font-weight: 700; }
        .modal-meta { display: flex; gap: 0.6rem; flex-wrap: wrap; margin: 1rem 0; }
        .modal-imdb { background: #f5c518; color: #000; padding: 0.2rem 0.7rem; border-radius: 20px; font-weight: bold; font-size: 0.8rem; }
        .modal-year, .modal-runtime { background: rgba(255,255,255,0.1); padding: 0.2rem 0.7rem; border-radius: 20px; font-size: 0.8rem; }
        .modal-plot { margin: 1rem 0; line-height: 1.5; color: #cbd5e1; font-size: 0.85rem; }
        .modal-plot h4 { color: #f5c518; margin-bottom: 0.5rem; }
        .modal-watch-btn { width: 100%; padding: 0.7rem; background: #f5c518; border: none; border-radius: 40px; font-weight: bold; cursor: pointer; margin-top: 1rem; }
        .footer { text-align: center; padding: 1.5rem; font-size: 0.7rem; color: #475569; }
        .stats { text-align: center; padding: 0.5rem; color: #f5c518; font-size: 0.75rem; }
        .loading { text-align: center; padding: 3rem; }
        .loading i { font-size: 2rem; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="header">
    <div class="logo"><h1><i class="fas fa-film"></i> ABICAN FİLMLER</h1></div>
    <button class="back-btn" onclick="window.location.href='index.html'"><i class="fas fa-arrow-left"></i> Ana Menü</button>
</div>
<div class="category-tabs" id="categoryContainer"></div>
<div class="stats" id="stats"></div>
<div class="film-grid" id="filmGrid"><div class="loading"><i class="fas fa-spinner fa-spin"></i><br>Filmler yükleniyor...</div></div>
<div class="footer"><i class="fab fa-imdb"></i> IMDb Puanları • <i class="fas fa-check-circle"></i> İzlediklerin kaybolur</div>
<div id="modal" class="modal"><div class="modal-content"><div class="modal-header"><img id="modalPoster" class="modal-poster" src=""><button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button></div><div class="modal-body"><h2 class="modal-title" id="modalTitle"></h2><div class="modal-meta"><span class="modal-imdb" id="modalImdb"></span><span class="modal-year" id="modalYear"></span><span class="modal-runtime" id="modalRuntime"></span></div><div class="modal-plot"><h4><i class="fas fa-align-left"></i> Konusu</h4><p id="modalPlot"></p></div><button class="modal-watch-btn" id="modalWatchBtn"><i class="fas fa-eye"></i> İZLEDİM</button></div></div></div>
<script>
    const TMDB_API_KEY = "b429c973c6c98439cf6e504e7ffe1678";
    let allMovies = [];
    let watchedIds = JSON.parse(localStorage.getItem("watched_film_ids")) || [];
    let currentMovieId = null;
    let currentCategory = "all";

    async function loadData() {
        try {
            const response = await fetch('imdb_data.json');
            if (!response.ok) throw new Error();
            const data = await response.json();
            allMovies = data.movies || [];
            
            for (let i = 0; i < allMovies.length; i++) {
                const m = allMovies[i];
                try {
                    const searchUrl = `https://api.themoviedb.org/3/find/${m.id}?api_key=${TMDB_API_KEY}&external_source=imdb_id`;
                    const posterRes = await fetch(searchUrl);
                    const posterData = await posterRes.json();
                    if (posterData.movie_results && posterData.movie_results.length > 0) {
                        const posterPath = posterData.movie_results[0].poster_path;
                        m.poster = posterPath ? `https://image.tmdb.org/t/p/w300${posterPath}` : `https://via.placeholder.com/300x450?text=${encodeURIComponent(m.title)}`;
                    } else {
                        m.poster = `https://via.placeholder.com/300x450?text=${encodeURIComponent(m.title)}`;
                    }
                } catch(e) {
                    m.poster = `https://via.placeholder.com/300x450?text=${encodeURIComponent(m.title)}`;
                }
                if (i % 10 === 0) await new Promise(r => setTimeout(r, 50));
            }
            
            allMovies.sort((a,b) => parseFloat(b.imdb) - parseFloat(a.imdb));
            renderCategories();
            renderMovies();
        } catch(err) { 
            document.getElementById("filmGrid").innerHTML = `<div style="text-align:center;padding:3rem;"><i class="fas fa-exclamation-triangle"></i><p>imdb_data.json bulunamadı!</p></div>`;
        }
    }
    
    function saveWatched(id) { 
        if(!watchedIds.includes(id)) { 
            watchedIds.push(id); 
            localStorage.setItem("watched_film_ids", JSON.stringify(watchedIds)); 
            renderMovies(); 
            if(currentMovieId === id) document.getElementById("modalWatchBtn").innerHTML = '<i class="fas fa-check-circle"></i> İZLENDİ'; 
        } 
    }
    function isWatched(id) { return watchedIds.includes(id); }
    function getFiltered() { 
        let movies = [...allMovies]; 
        if(currentCategory !== "all") movies = movies.filter(m => m.genre && m.genre.includes(currentCategory));
        return movies.filter(m => !isWatched(m.id)); 
    }
    function renderMovies() {
        const movies = getFiltered();
        document.getElementById("stats").innerHTML = `<i class="fab fa-imdb"></i> ${movies.length} / ${allMovies.length} film`;
        if(movies.length === 0) { document.getElementById("filmGrid").innerHTML = `<div style="text-align:center;padding:3rem;"><i class="fas fa-trophy"></i><p>🎉 Tüm filmleri izledin!</p></div>`; return; }
        document.getElementById("filmGrid").innerHTML = movies.map(m => `<div class="film-card" data-id="${m.id}"><img class="poster" src="${m.poster}" onerror="this.src='https://via.placeholder.com/300x450?text=${encodeURIComponent(m.title)}'"><div class="info"><div class="title">${m.title.length > 25 ? m.title.substring(0,22)+'...' : m.title}</div><div class="imdb"><i class="fab fa-imdb"></i> ${m.imdb}</div><div class="year"><i class="far fa-calendar-alt"></i> ${m.year}</div><button class="watched-btn ${isWatched(m.id) ? 'watched' : ''}" data-id="${m.id}">${isWatched(m.id) ? '<i class="fas fa-check-circle"></i> İZLENDİ' : '<i class="fas fa-eye"></i> İZLEDİM'}</button></div></div>`).join('');
        document.querySelectorAll('.film-card').forEach(card => { card.addEventListener('click', (e) => { if(e.target.classList.contains('watched-btn')) return; const movie = allMovies.find(m => m.id === card.dataset.id); if(movie) openModal(movie); }); });
        document.querySelectorAll('.watched-btn:not(.watched)').forEach(btn => { btn.addEventListener('click', (e) => { e.stopPropagation(); saveWatched(btn.dataset.id); renderMovies(); }); });
    }
    function openModal(m) { currentMovieId = m.id; document.getElementById("modalPoster").src = m.poster; document.getElementById("modalTitle").innerHTML = m.title; document.getElementById("modalImdb").innerHTML = `<i class="fab fa-imdb"></i> ${m.imdb}`; document.getElementById("modalYear").innerHTML = `<i class="far fa-calendar-alt"></i> ${m.year}`; document.getElementById("modalRuntime").innerHTML = `<i class="far fa-clock"></i> ${m.runtime}`; document.getElementById("modalPlot").innerHTML = m.plot || "Konu bilgisi yok"; document.getElementById("modalWatchBtn").innerHTML = isWatched(m.id) ? '<i class="fas fa-check-circle"></i> İZLENDİ' : '<i class="fas fa-eye"></i> İZLEDİM'; document.getElementById("modal").style.display = "flex"; }
    function closeModal() { document.getElementById("modal").style.display = "none"; currentMovieId = null; }
    function renderCategories() { const cats = ["all", "Aksiyon", "Komedi", "Dram", "Korku", "Bilim Kurgu", "Romantik", "Suç", "Gerilim"]; const catMap = {"all":"Tümü","Action":"Aksiyon","Comedy":"Komedi","Drama":"Dram","Horror":"Korku","Sci-Fi":"Bilim Kurgu","Romance":"Romantik","Crime":"Suç","Thriller":"Gerilim"}; document.getElementById("categoryContainer").innerHTML = cats.map(c => `<button class="cat-btn ${currentCategory === c ? 'active' : ''}" data-cat="${c}"><i class="fas ${c === 'all' ? 'fa-border-all' : c === 'Action' ? 'fa-fist-raised' : c === 'Drama' ? 'fa-mask' : c === 'Comedy' ? 'fa-laugh' : c === 'Horror' ? 'fa-ghost' : c === 'Sci-Fi' ? 'fa-rocket' : 'fa-tag'}"></i> ${catMap[c] || c}</button>`).join(''); document.querySelectorAll('.cat-btn').forEach(btn => { btn.addEventListener('click', () => { currentCategory = btn.dataset.cat; renderCategories(); renderMovies(); }); }); }
    window.onclick = function(e) { if(e.target === document.getElementById("modal")) closeModal(); }
    document.getElementById("modalWatchBtn").addEventListener("click", () => { if(currentMovieId && !isWatched(currentMovieId)) saveWatched(currentMovieId); });
    loadData();
</script>
</body>
</html>
